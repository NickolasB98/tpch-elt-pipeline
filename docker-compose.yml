version: "3.9"

services:
  dbt:
    build:
      context: .
      dockerfile: Dockerfile
    image: tpch-elt-pipeline:latest
    env_file:
      - .env
    volumes:
      - ./my_dbt_project:/usr/app/dbt
    command: ["dbt", "build"]

  dbt-staging:
    build:
      context: .
      dockerfile: Dockerfile
    image: tpch-elt-pipeline:latest
    env_file:
      - .env
    volumes:
      - ./my_dbt_project:/usr/app/dbt
    command: ["dbt", "run", "--select", "staging"]
    profiles:
      - staging

  dbt-test:
    build:
      context: .
      dockerfile: Dockerfile
    image: tpch-elt-pipeline:latest
    env_file:
      - .env
    volumes:
      - ./my_dbt_project:/usr/app/dbt
    command: ["dbt", "test"]
    profiles:
      - test
